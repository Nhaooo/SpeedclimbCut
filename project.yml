name: SpeedClimbCut
options:
  bundleIdPrefix: com.noahj
targets:
  SpeedClimbCut:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
        excludes:
          - "**/*.py"
          - "project.yml"
          - ".github"
    info:
      path: Info.plist
    settings:
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
      INFOPLIST_FILE: Info.plist
      GENERATE_INFOPLIST_FILE: NO
