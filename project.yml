name: SpeedClimbCut
options:
  bundleIdPrefix: com.noahj
targets:
  SpeedClimbCut:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
      - path: Managers
      - path: Models
      - path: Services
      - path: UI
    info:
      path: Info.plist
    settings:
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
      INFOPLIST_FILE: Info.plist
      GENERATE_INFOPLIST_FILE: NO
      INFOPLIST_KEY_NSCameraUsageDescription: "L'application a besoin d'acceder a la camera pour enregistrer les ascensions."
      INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "L'application a besoin de lire vos videos pour les analyser."
      INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "L'application a besoin de sauvegarder la video decoupee."
