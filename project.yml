name: SpeedClimbCut
options:
  bundleIdPrefix: com.noahj
targets:
  SpeedClimbCut:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
      - path: Managers
      - path: Models
      - path: Services
      - path: UI
    info:
      path: Info.plist
      properties:
        NSCameraUsageDescription: "L'application a besoin d'acceder a la camera pour enregistrer les ascensions."
        NSPhotoLibraryUsageDescription: "L'application a besoin de lire vos videos pour les analyser."
        NSPhotoLibraryAddUsageDescription: "L'application a besoin de sauvegarder la video decoupee."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
    settings:
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
      INFOPLIST_FILE: Info.plist
      GENERATE_INFOPLIST_FILE: NO
