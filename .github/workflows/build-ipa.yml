name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Verify Source Info.plist Privacy Keys
        run: |
          /usr/libexec/PlistBuddy -c "Print NSCameraUsageDescription" Info.plist
          /usr/libexec/PlistBuddy -c "Print NSPhotoLibraryUsageDescription" Info.plist
          /usr/libexec/PlistBuddy -c "Print NSPhotoLibraryAddUsageDescription" Info.plist

      - name: Build IPA (Unsigned)
        run: |
          xcodebuild clean build \
            -project SpeedClimbCut.xcodeproj \
            -scheme SpeedClimbCut \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=${{ github.workspace }}/build

      - name: Verify Built Info.plist Privacy Keys
        run: |
          APP_PLIST="${{ github.workspace }}/build/SpeedClimbCut.app/Info.plist"
          /usr/libexec/PlistBuddy -c "Print NSCameraUsageDescription" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Print NSPhotoLibraryUsageDescription" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Print NSPhotoLibraryAddUsageDescription" "$APP_PLIST"

      - name: Create Payload
        run: |
          rm -rf Payload SpeedClimbCut.ipa ipa_check
          mkdir -p Payload
          cp -R build/SpeedClimbCut.app Payload/
          zip -r SpeedClimbCut.ipa Payload

      - name: Verify IPA Contents
        run: |
          unzip -l SpeedClimbCut.ipa
          mkdir -p ipa_check
          unzip -q SpeedClimbCut.ipa -d ipa_check
          APP_PLIST="${{ github.workspace }}/ipa_check/Payload/SpeedClimbCut.app/Info.plist"
          /usr/libexec/PlistBuddy -c "Print NSCameraUsageDescription" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Print NSPhotoLibraryUsageDescription" "$APP_PLIST"
          /usr/libexec/PlistBuddy -c "Print NSPhotoLibraryAddUsageDescription" "$APP_PLIST"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SpeedClimbCut-Unsigned-IPA
          path: SpeedClimbCut.ipa
